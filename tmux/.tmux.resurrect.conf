# Resurrect / Continuum
# Keep restore rules in a separate file so it's easy to extend.
#
# Patterns:
# - plain program name: restore normally
# - program->command: use custom restore command
# - * expands saved arguments
# - ~name matches processes containing that name
#
# Examples:
#   "pi->pi -r"
#   "codex->codex resume --last"
#   "claude->claude --resume last"
#   "~ssh->ssh *"

set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"

set -g @resurrect-capture-pane-contents "on"
# tmux-resurrect appends @resurrect-processes to its default list.
# Remove vi/vim/view/nvim from defaults so restore does not auto-start editors.
set -g @resurrect-default-processes 'emacs man less more tail top htop irssi weechat mutt'
set -g @resurrect-processes '"~ssh->ssh *" "pi->pi -r" "codex->codex resume --last" "claude->claude --resume"'
set -g @continuum-restore "on"
