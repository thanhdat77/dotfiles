# Resurrect / Continuum
# Keep restore rules in a separate file so it's easy to extend.
#
# Patterns:
# - plain program name: restore normally
# - program->command: use custom restore command
# - * expands saved arguments
# - ~name matches processes containing that name
#
# Examples:
#   "pi->pi -r"
#   "codex->codex resume --last"
#   "claude->claude --resume last"
#   "~ssh->ssh *"

set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"

set -g @resurrect-capture-pane-contents "on"
set -g @resurrect-processes '"~ssh->ssh *" "pi->pi -r" "codex->codex resume --last" "claude->claude --resume last"'
set -g @continuum-restore "on"
