# Enable True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -gq allow-passthrough on
set -g set-clipboard on

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set-option -g prefix C-Space
set-option -g prefix2 none

# Utility bindings
unbind r
bind r source-file ~/.tmux.conf

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind v
bind v copy-mode

# floating terminal via tmux-floax
unbind -n C-/
unbind -n C-_
set -g @floax-bind 'C-/'
set -g @floax-bind-menu 'P'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color '#ea9d34'
set -g @floax-text-color '#575279'
set -g @floax-title ' Float Terminal '
set -g @floax-session-name 'scratch'
set -g @floax-change-path 'true'

# maximize panes
bind -r m resize-pane -Z
unbind C-Space
bind Space switch-client -l

# resize panes with prefix + Shift-h/j/k/l
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# mouse support
set -g mouse on

# vim shell navigations and selects in tmux panes
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-S-c' send -X copy-pipe-no-clear 'win32yank.exe -i --crlf'
set -g @override_copy_command 'win32yank.exe -i --crlf'
# 'y' and mouse copy are managed by tmux-yank via @override_copy_command

unbind f
bind f display-popup -E -w 75% -h 85% "tv --channel sesh"
bind F display-popup -E -w 80% -h 85% "tv --channel claude-sessions"
#@ Ctrl-T now opens Herdr Picker Plus instead of sesh while migrating to Herdr.
bind -n C-t run-shell -b "herdr plugin action invoke herdr-picker-plus.open"

# TPM
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm'
# Usefull official 

# Core UX
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'sainnhe/tmux-fzf'
# TMUX_FZF_LAUNCH_KEY="C-l"
# TMUX_FZF_SWITCH_CURRENT=1

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'azorng/tmux-smooth-scroll'
set -g @plugin 'omerxx/tmux-floax'

# set -g @plugin 'catppuccin/tmux'
# set -g @catppuccin_flavor 'latte'
# Sessions

set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 's'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-preview-enabled 'true'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '55%'
set -g @sessionx-tree-mode 'on'
set -g @sessionx-filter-current 'false'
set -g @sessionx-pointer '▶ '
set -g @sessionx-additional-options '--ansi --color=fg:#24292f,bg:#f6f8fa,fg+:#0a3069,bg+:#d8dee4,hl:#0969da,hl+:#0969da,info:#57606a,prompt:#1a7f37,pointer:#0969da,marker:#d1242f,border:#d0d7de,spinner:#0969da,header:#57606a'

source-file ~/dotfiles/tmux/.tmux.resurrect.conf


# Mouse
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
# tmux-click-copy removed — conflicts with tmux-yank on MouseDragEnd1Pane






# usefull maybe need layter
# set -g @plugin 'alexekdahl/tmux-compile'

run '~/.config/tmux/.tmux/plugins/tpm/tpm'
# Some terminals send Ctrl-/ as Ctrl-_
bind C-_ run-shell '~/.config/tmux/.tmux/plugins/tmux-floax/scripts/floax.sh'
source-file ~/dotfiles/tmux/.tmux.theme.conf

# window jump (after TPM to override plugins)
bind C-n select-window -t 1
bind C-e select-window -t 2
bind Tab select-window -t 3
bind C-l select-window -t 4
bind C-u select-window -t 5
bind C-y select-window -t 6
