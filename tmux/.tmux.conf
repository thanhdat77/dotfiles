# Enable True color support
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set-option -g prefix C-Space
set-option -g prefix2 none

# Utility bindings
unbind r
bind r source-file ~/.tmux.conf

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind v
bind v copy-mode


# maximize panes
bind -r m resize-pane -Z

# mouse support
set -g mouse on

# vim shell navigations and selects in tmux panes
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-S-c' send -X copy-pipe-no-clear 'clip.exe'
# 'y' is managed by tmux-yank via @override_copy_command

unbind f
bind f display-popup -E -w 75% -h 85% "tv --channel sesh"
bind F display-popup -E -w 80% -h 85% "tv --channel claude-sessions"

# TPM
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm'
# Usefull official 

# Core UX
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'azorng/tmux-smooth-scroll'

set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'dawn'
# set -g @plugin 'catppuccin/tmux'
# set -g @catppuccin_flavor 'latte'
# Sessions

set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 's'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-preview-enabled 'true'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '55%'
set -g @sessionx-tree-mode 'on'
set -g @sessionx-filter-current 'false'

set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum" 
set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"


# Mouse
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
# tmux-click-copy removed — conflicts with tmux-yank on MouseDragEnd1Pane

# tmux-yank: keep selection visible after copy, use WSL clipboard
set -g @yank_action 'copy-pipe-no-clear'
set -g @override_copy_command 'clip.exe'



# usefull maybe need layter
# set -g @plugin 'alexekdahl/tmux-compile'

# Catppuccin Mocha Theme


# set -g @minimal_theme_text_color "#90C4F9"
# set -g @minimal_theme_accent_color "#90C4F9"
# set -g @minimal_theme_border_color "#90C4F9"


# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_bg}]},#{#[bg=#{@thm_bg},fg=#{@thm_green}]}} #{battery_icon} #{battery_percentage} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"



# Configure Tmux
set -g status-position bottom
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

set -g window-status-format " #I: #W "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_surface_0}] "

set -g window-status-current-format "#[fg=#{@thm_blue},bg=#{@thm_bg}]#[fg=#{@thm_bg},bg=#{@thm_blue},bold] #I: #W #[fg=#{@thm_blue},bg=#{@thm_bg},nobold]"
set -g window-status-current-style "bg=#{@thm_blue},fg=#{@thm_bg},bold"




run '~/.config/tmux/.tmux/plugins/tpm/tpm'

# window jump: C-r/s/t/w/f/p → window 1-6 (after TPM to override plugins)
bind C-r select-window -t 1
bind C-s select-window -t 2
bind C-t select-window -t 3
bind C-w select-window -t 4
bind C-f select-window -t 5
bind C-p select-window -t 6
