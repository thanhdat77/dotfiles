## Set this to true so Atuin detects Git repos
workspaces = true

## Set the default filter to 'directory' or 'workspace' 
## 'workspace' is usually better for devs as it covers the whole project
filter_mode = "workspace"

## This ensures that when you hit the 'Up' arrow, 
## it immediately filters for the current folder/project
filter_mode_shell_up_key_binding = "directory"

[search]
## Reorder this so Atuin looks at local context BEFORE global history
filters = ["directory", "workspace", "session", "host", "global"]
