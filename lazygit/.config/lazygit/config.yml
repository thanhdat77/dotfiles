gui:
  theme:
    activeBorderColor:
      - green
      - bold
    inactiveBorderColor:
      - default
  screenMode: half
  sidePanelWidth: 0.4
  expandFocusedSidePanel: true
  expandedSidePanelWeight: 4
os:
  editPreset: "nvim-remote"
git:
  log:
    showGraph: always
    showWholeGraph: true
  pagers:
    - pager: delta --light --paging=never --line-numbers
      colorArg: always
customCommands:
  - key: "D"
    description: "Open diffview (full VS Code style diff)"
    command: 'nvim -c "DiffviewOpen"'
    context: "global"
    output: terminal
  - key: "F"
    description: "File history in diffview"
    command: 'nvim -c "DiffviewFileHistory {{.SelectedFile.Name}}"'
    context: "files"
    output: terminal
  - key: "X"
    description: "Diff current branch vs origin"
    command: 'git fetch origin --quiet && nvim -c "DiffviewOpen origin/$(git branch --show-current)...HEAD"'
    context: "global"
    output: terminal
